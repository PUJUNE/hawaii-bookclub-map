<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>하와이 독서모임 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{
    --surface:#fcfcfb; --plane:#f9f9f7;
    --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
    --hair:#e1e0d9; --ring:rgba(11,11,11,.10);
    --y21:#9b9992; --y22:#2a78d6; --y23:#1baf7a; --y24:#eda100; --y25:#008300; --y26:#4a3aa7;
    --edge:#8a887f;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    display:flex; font-family:system-ui,-apple-system,"Segoe UI","Malgun Gothic",sans-serif;
    color:var(--ink); background:var(--plane);
  }
  /* ---------- sidebar ---------- */
  #side{
    width:372px; min-width:300px; height:100%; display:flex; flex-direction:column;
    background:var(--surface); border-right:1px solid var(--hair); z-index:1000;
  }
  #side header{padding:18px 18px 12px; border-bottom:1px solid var(--hair)}
  #side h1{font-size:17px; font-weight:700; letter-spacing:-.2px}
  #side .sub{font-size:12px; color:var(--ink2); margin-top:4px}
  .legend{display:flex; flex-wrap:wrap; gap:6px 12px; margin-top:10px}
  .legend span{display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--ink2)}
  .legend i{width:10px; height:10px; border-radius:50%; display:inline-block; border:1px solid var(--ring)}
  .controls{display:flex; align-items:center; gap:8px; margin-top:12px; flex-wrap:wrap}
  .btn{
    font:600 12px/1 system-ui,"Malgun Gothic",sans-serif; color:var(--ink2);
    padding:6px 11px; border:1px solid var(--hair); border-radius:999px;
    background:var(--surface); cursor:pointer;
  }
  .btn:hover{background:var(--plane); color:var(--ink)}
  .chk{display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--ink2); cursor:pointer}
  #list{flex:1; overflow-y:auto; padding:8px 0}
  .item{
    display:flex; gap:10px; padding:9px 18px; cursor:pointer;
    border-left:3px solid transparent;
  }
  .item:hover{background:var(--plane)}
  .item.active{background:var(--plane); border-left-color:var(--ink)}
  .item.off{cursor:default; opacity:.55}
  .badge{
    flex:0 0 24px; width:24px; height:24px; border-radius:50%; margin-top:1px;
    font:700 11px/22px system-ui; text-align:center; color:#fff;
    border:1.5px solid #fff; box-shadow:0 0 0 1px var(--ring);
  }
  .badge.dim{background:var(--surface); color:var(--muted); border:1.5px dashed var(--hair); box-shadow:none}
  .item .tx{min-width:0}
  .item .t{font-size:13px; font-weight:600; line-height:1.35}
  .item .m{font-size:11.5px; color:var(--muted); margin-top:2px; line-height:1.4}
  #side footer{padding:10px 18px; border-top:1px solid var(--hair); font-size:11px; color:var(--muted)}
  /* ---------- map ---------- */
  #map{flex:1; height:100%; background:#eceae4}
  .node{
    width:26px; height:26px; border-radius:50%;
    background:var(--c); color:var(--tc,#fff);
    border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.35);
    font:700 12px/22px system-ui; text-align:center;
    transition:transform .15s;
  }
  .node.sel{transform:scale(1.35); box-shadow:0 2px 8px rgba(0,0,0,.45)}
  .arrow{pointer-events:none}
  .leaflet-popup-content-wrapper{border-radius:10px; box-shadow:0 4px 18px rgba(0,0,0,.18)}
  .leaflet-popup-content{margin:14px 16px; font-family:inherit}
  .pp .k{font-size:11px; color:var(--muted); margin-bottom:2px}
  .pp .t{font-size:14px; font-weight:700; line-height:1.35; margin-bottom:6px}
  .pp .r{font-size:12px; color:var(--ink2); line-height:1.55}
  .pp .c{font-size:11.5px; color:var(--muted); line-height:1.5; margin-top:7px; padding-top:7px; border-top:1px solid var(--hair)}
  @media (max-width:760px){
    body{flex-direction:column}
    #map{order:1; flex:1 1 55%}
    #side{order:2; width:100%; min-width:0; flex:1 1 45%; border-right:none; border-top:1px solid var(--hair)}
  }
</style>
</head>
<body>

<aside id="side">
  <header>
    <h1>하와이 독서모임 지도</h1>
    <div class="sub" id="subtitle"></div>
    <div class="legend" id="legend"></div>
    <div class="controls">
      <button class="btn" id="btnSeoul">수도권 보기</button>

 33:'세상에서 가장 짧은 경제사, 자본주의자 선언, 거대한 분기점, 아이로봇',
 34:'AI혁명 슈퍼에이전시, 박태웅의 AI강의 2025, 변화하는 세상 미리가본 미래, AI인간지능의 시대',
 35:'“시작” “신년” “새로움”을 테마로 한 도서를 각자 읽고 교환해요!',
 36:'“시작” “신년” “새로움”을 테마로 해서 미스터리하게 교환한 뽑기 도서를 감상해요!',
 37:'타인의 취향 1탄! (부제: 독재자인 저를 견디세요)',
 38:'나를 소모하지 않는 현명한 태도, 생각하는 기계, 안티프래질, 뇌는 어떻게 변화를 거부하는가',
 39:'타인의 취향 2탄! (부제: 석준님의 집권)',
};
const mapped = M.filter(m => m.ll);

/* ---------- map ---------- */
const map = L.map('map', {zoomSnap:.5});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  maxZoom:19, subdomains:'abcd',
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>'
}).addTo(map);

const seoulBounds = L.latLngBounds(mapped.filter(m=>m.ll[0]>36.5).map(m=>m.ll)).pad(0.08);
const allBounds   = L.latLngBounds(mapped.map(m=>m.ll)).pad(0.08);
map.fitBounds(seoulBounds);

/* ---------- edges (curved + mid arrow) ---------- */
function curvePts(a, b){
  const k = 0.18, n = 32;
  const mx=(a[0]+b[0])/2, my=(a[1]+b[1])/2;
  const dx=b[0]-a[0], dy=b[1]-a[1];
  const cx=mx-dy*k, cy=my+dx*k;              // 수직 방향으로 살짝 휨
  const pts=[];
  for(let i=0;i<=n;i++){
    const t=i/n, u=1-t;
    pts.push([u*u*a[0]+2*u*t*cx+t*t*b[0], u*u*a[1]+2*u*t*cy+t*t*b[1]]);
  }
  return pts;
}
const pathLayer = L.layerGroup().addTo(map);
for(let i=0;i<mapped.length-1;i++){
  const a=mapped[i].ll, b=mapped[i+1].ll;
  const pts=curvePts(a,b);
  L.polyline(pts, {color:'#8a887f', weight:2, opacity:.6}).addTo(pathLayer);
  // 중간 지점 화살표 (진행 방향)
  const p1=pts[15], p2=pts[17], mid=pts[16];
  const rad = (mid[0]+ (a[0]+b[0])/2)/2 * Math.PI/180;
  const ang = Math.atan2((p2[1]-p1[1])*Math.cos(rad), p2[0]-p1[0]) * 180/Math.PI;
  L.marker(mid, {
    interactive:false,
    icon: L.divIcon({className:'arrow', iconSize:[14,14], iconAnchor:[7,7],
      html:`<svg viewBox="0 0 12 12" style="transform:rotate(${ang}deg)"><path d="M6 0 L11 11 L6 8.6 L1 11 Z" fill="#6f6d66"/></svg>`})
  }).addTo(pathLayer);
}
document.getElementById('chkPath').addEventListener('change', e => {
  e.target.checked ? pathLayer.addTo(map) : map.removeLayer(pathLayer);
});

/* ---------- nodes ---------- */
const markers = {};
mapped.forEach(m => {
  const tc = YTXT[m.y] || '#fff';
  const mk = L.marker(m.ll, {
    zIndexOffset: m.n*10,
    icon: L.divIcon({className:'', iconSize:[26,26], iconAnchor:[13,13],
      html:`<div class="node" id="node-${m.n}" style="--c:${YC[m.y]};--tc:${tc}">${m.n}</div>`})
  }).addTo(map);
  mk.bindPopup(popupHtml(m), {maxWidth:270});
  mk.on('click', () => select(m.n, false));
  markers[m.n] = mk;
});
function popupHtml(m){
  const cand = CAND[m.n] ? `<div class="c">아쉬웠던 다른 후보작 — ${CAND[m.n]}</div>` : '';
  return `<div class="pp">
    <div class="k">${m.n}번째 모임 · ${m.p}</div>
    <div class="t">${m.t}</div>
    <div class="r">${m.a ? '저자 ' + m.a + '<br>' : ''}${m.d}<br>📍 ${m.pl}</div>
    ${cand}
  </div>`;
}

/* ---------- sidebar ---------- */
document.getElementById('subtitle').textContent =
  `모임 ${M.length}회 · 지도 표시 ${mapped.length}곳 (2021–2026)`;

const legend = document.getElementById('legend');
[[22,'2022'],[23,'2023'],[24,'2024'],[25,'2025'],[26,'2026']].forEach(([y,label])=>{
  legend.insertAdjacentHTML('beforeend', `<span><i style="background:${YC[y]}"></i>${label}</span>`);
});

const list = document.getElementById('list');
M.forEach(m => {
  const on = !!m.ll;
  const badge = on
    ? `<div class="badge" style="background:${YC[m.y]};color:${YTXT[m.y]||'#fff'}">${m.n}</div>`
    : `<div class="badge dim">${m.n}</div>`;
  const meta = [m.d, m.pl || '장소 기록 없음'].join(' · ');
  list.insertAdjacentHTML('beforeend',
    `<div class="item${on?'':' off'}" id="item-${m.n}">${badge}
       <div class="tx"><div class="t">${m.t}</div><div class="m">${meta}</div></div>
     </div>`);
  if(on) document.getElementById('item-'+m.n).addEventListener('click', () => select(m.n, true));
});

let selected = null;
function select(n, fly){
  if(selected){
    document.getElementById('item-'+selected)?.classList.remove('active');
    document.getElementById('node-'+selected)?.classList.remove('sel');
  }
  selected = n;
  document.getElementById('item-'+n)?.classList.add('active');
  document.getElementById('node-'+n)?.classList.add('sel');
  document.getElementById('item-'+n)?.scrollIntoView({block:'nearest', behavior:'smooth'});
  if(fly){
    const m = M.find(x=>x.n===n);
    map.once('moveend', () => markers[n].openPopup());
    map.flyTo(m.ll, Math.max(map.getZoom(), 13), {duration:.8});
    setTimeout(() => { if(!markers[n].isPopupOpen()) markers[n].openPopup(); }, 1200);
  }
}

document.getElementById('btnSeoul').addEventListener('click', () => map.fitBounds(seoulBounds, {animate:true}));
document.getElementById('btnAll').addEventListener('click', () => map.fitBounds(allBounds, {animate:true}));
</script>
</body>
</html>
